global:
  resolve_timeout: 5m

route:
  receiver: vargate-notify
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: vargate-notify
    email_configs:
      - to: "rlarkin999@gmail.com"
        from: "alerts@vargate.ai"
        smarthost: "smtp.resend.com:587"
        auth_username: "resend"
        auth_password_file: /etc/alertmanager/smtp_password
        require_tls: true
