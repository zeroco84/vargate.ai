# Production overlay for Hetzner deployment.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# This file overrides the base docker-compose.yml to:
#   - Remove public port bindings for all internal services
#   - Bind gateway + UI to localhost only (host nginx proxies to them)
#   - Add restart policies and persistence volumes
#   - Set production environment variables
#
# TLS is handled by host nginx + certbot (not Docker).

services:

  # ── Bundle Server ────────────────────────────────────────────────────────────
  bundle-server:
    restart: unless-stopped
    ports: !override []
    networks:
      - vargate-internal

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    restart: unless-stopped
    ports: !override []
    networks:
      - vargate-internal
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"

  # ── OPA ──────────────────────────────────────────────────────────────────────
  opa:
    restart: unless-stopped
    ports: !override []
    networks:
      - vargate-internal

  # ── Gateway ──────────────────────────────────────────────────────────────────
  gateway:
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:8000:8000"
    networks:
      - vargate-internal
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ANCHOR_INTERVAL_SECONDS=300
    volumes:
      - audit-data:/data
      - backup-data:/backup
      - shared-data:/shared:ro

  # ── HSM ──────────────────────────────────────────────────────────────────────
  hsm:
    restart: unless-stopped
    ports: !override []
    networks:
      - vargate-internal
    volumes:
      - hsm-tokens:/var/lib/softhsm/tokens
      - cred-data:/data

  # ── Mock Tools ───────────────────────────────────────────────────────────────
  mock-tools:
    restart: unless-stopped
    ports: !override []
    networks:
      - vargate-internal

  # ── Blockchain (Hardhat) ─────────────────────────────────────────────────────
  blockchain:
    restart: unless-stopped
    ports: !override []
    networks:
      - vargate-internal
    volumes:
      - hardhat-data:/app/data
      - shared-data:/shared

  # ── UI (React dashboard) ─────────────────────────────────────────────────────
  ui:
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:3000:80"
    networks:
      - vargate-internal

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    restart: unless-stopped
    ports: !override []
    networks:
      - vargate-internal

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:3001:3000"
    networks:
      - vargate-internal

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    restart: unless-stopped
    ports: !override []
    networks:
      - vargate-internal

networks:
  vargate-internal:
    driver: bridge

volumes:
  audit-data:
  backup-data:
  bundle-archive:
  hsm-tokens:
  cred-data:
  shared-data:
  redis-data:
  hardhat-data:
  prometheus-data:
  grafana-data:
