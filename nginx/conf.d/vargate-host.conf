# ═══════════════════════════════════════════════════════════════════════════
# vargate.ai — HOST nginx config (TLS via Let's Encrypt)
# ═══════════════════════════════════════════════════════════════════════════
#
# vargate.ai       → Marketing site (static HTML)
# vargate.ai/api/  → Gateway API (localhost:8000)
# vargate.ai/dashboard/ → React dashboard (localhost:3000)
#

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    server_name vargate.ai www.vargate.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name vargate.ai www.vargate.ai;

    ssl_certificate     /etc/letsencrypt/live/vargate.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vargate.ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── TLS hardening ─────────────────────────────────────────────────────
    ssl_stapling on;
    ssl_stapling_responder on;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── API proxy → gateway container on port 8000 ─────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 120s;

        add_header Access-Control-Allow-Origin "https://vargate.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Dashboard → ui container on port 3000 ─────────────────────────────
    location /dashboard/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Dashboard assets (Vite build outputs /assets/*) ───────────────────
    location ^~ /assets/ {
        proxy_pass http://127.0.0.1:3000/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Grafana → monitoring container on port 3001 ──────────────────────
    location /grafana/ {
        proxy_pass http://127.0.0.1:3001/grafana/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Marketing site (static) ────────────────────────────────────────────
    root /var/www/vargate-marketing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
