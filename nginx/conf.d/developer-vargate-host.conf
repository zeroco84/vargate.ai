# Developer docs site: developer.vargate.ai
#
# Setup steps:
#   1. Add DNS A record for developer.vargate.ai → 204.168.135.95
#      (or CNAME via Cloudflare with proxy enabled, SSL Full Strict)
#   2. If using Let's Encrypt directly:
#      certbot certonly --webroot -w /var/www/certbot -d developer.vargate.ai
#   3. Copy this file to /etc/nginx/conf.d/
#   4. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name developer.vargate.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name developer.vargate.ai;

    ssl_certificate     /etc/letsencrypt/live/developer.vargate.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/developer.vargate.ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    ssl_stapling on;
    ssl_stapling_verify on;

    location / {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
