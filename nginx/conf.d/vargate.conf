# vargate.ai — nginx site configuration
# Handles:
#   https://vargate.ai/        → React dashboard (ui service, port 80)
#   https://vargate.ai/api/    → Gateway API (gateway service, port 8000)

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name vargate.ai;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name vargate.ai;

    ssl_certificate     /etc/letsencrypt/live/vargate.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vargate.ai/privkey.pem;

    # Modern TLS config (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (enable after you've confirmed everything works)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # ── API proxy → gateway:8000 ───────────────────────────────────────────────
    # The React dashboard calls /api/* — nginx strips the prefix and forwards
    # to the internal gateway service.
    location /api/ {
        proxy_pass http://gateway:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / long-poll support (dashboard live mode)
        proxy_buffering off;
        proxy_read_timeout 120s;

        # CORS headers
        add_header Access-Control-Allow-Origin "https://vargate.ai" always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Dashboard → ui:80 (internal nginx serving Vite build) ─────────────────
    location / {
        proxy_pass http://ui:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";   # WebSocket support
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

