services:
  bundle-server:
    build:
      context: ./bundle-server
    ports:
      - "8080:8080"
    volumes:
      - bundle-archive:/data/archive
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/bundles/vargate/status')"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 2s

  hsm:
    build:
      context: ./hsm
      dockerfile: Dockerfile
    volumes:
      - hsm-tokens:/var/lib/softhsm/tokens
    ports:
      - "8300:8300"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  blockchain:
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
    volumes:
      - shared-data:/shared
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  opa:
    image: openpolicyagent/opa:latest
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--config-file=/config/opa-config.yaml"
    volumes:
      - ./config:/config:ro
    ports:
      - "8181:8181"
    depends_on:
      bundle-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  gateway:
    build:
      context: ./gateway
    ports:
      - "8000:8000"
    environment:
      - OPA_URL=http://opa:8181
      - DB_PATH=/data/audit.db
      - REDIS_URL=redis://redis:6379/0
      - BUNDLE_SERVER_URL=http://bundle-server:8080
      - HSM_URL=http://hsm:8300
      - BLOCKCHAIN_RPC_URL=http://blockchain:8545
      - CONTRACT_ADDRESS_FILE=/shared/contract_address.txt
      - CONTRACT_ABI_FILE=/shared/AuditAnchor.abi.json
      - ANCHOR_INTERVAL_SECONDS=60
    volumes:
      - audit-data:/data
      - shared-data:/shared:ro
    depends_on:
      opa:
        condition: service_healthy
      redis:
        condition: service_healthy
      hsm:
        condition: service_healthy
      blockchain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  audit-data:
  bundle-archive:
  hsm-tokens:
  shared-data:
