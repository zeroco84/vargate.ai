services:
  bundle-server:
    build:
      context: ./bundle-server
    ports:
      - "8080:8080"
    volumes:
      - bundle-archive:/data/archive
      - ./policies:/policies:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/bundles/vargate/status')"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 2s

  hsm:
    build:
      context: ./hsm
      dockerfile: Dockerfile
    volumes:
      - hsm-tokens:/var/lib/softhsm/tokens
      - cred-data:/data
    ports:
      - "8300:8300"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  mock-tools:
    build:
      context: ./mock-tools
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 3s

  blockchain:
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
    volumes:
      - shared-data:/shared
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  opa:
    image: openpolicyagent/opa:latest
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--config-file=/config/opa-config.yaml"
    volumes:
      - ./config:/config:ro
    ports:
      - "8181:8181"
    depends_on:
      bundle-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  gateway:
    build:
      context: ./gateway
    ports:
      - "8000:8000"
    environment:
      - OPA_URL=http://opa:8181
      - DB_PATH=/data/audit.db
      - REDIS_URL=redis://redis:6379/0
      - BUNDLE_SERVER_URL=http://bundle-server:8080
      - HSM_URL=http://hsm:8300
      - MOCK_TOOLS_URL=http://mock-tools:9000
      - BLOCKCHAIN_RPC_URL=http://blockchain:8545
      - CONTRACT_ADDRESS_FILE=/shared/contract_address.txt
      - CONTRACT_ABI_FILE=/shared/AuditAnchor.abi.json
      - ANCHOR_INTERVAL_SECONDS=${ANCHOR_INTERVAL_SECONDS:-3600}
      # ── Stage 7B: Sepolia Merkle anchoring ──
      - SEPOLIA_RPC_URL=${SEPOLIA_RPC_URL:-}
      - DEPLOYER_PRIVATE_KEY=${DEPLOYER_PRIVATE_KEY:-}
      - MERKLE_CONTRACT_FILE=/shared/MerkleAuditAnchor.json
      - SYSTEM_ID=vargate-v1
      # ── Stage 7C: AGCS compliance ──
      - ANCHOR_MODE=${ANCHOR_MODE:-full}
      - MERKLE_ROOT_INTERVAL_SECONDS=${MERKLE_ROOT_INTERVAL_SECONDS:-3600}
      # ── Sprint 5: Multi-chain blockchain anchoring ──
      - POLYGON_RPC_URL=${POLYGON_RPC_URL:-}
      - POLYGON_PRIVATE_KEY=${POLYGON_PRIVATE_KEY:-}
      - POLYGON_CONTRACT_FILE=/shared/PolygonMerkleAuditAnchor.json
      - ETH_MAINNET_RPC_URL=${ETH_MAINNET_RPC_URL:-}
      - ETH_MAINNET_PRIVATE_KEY=${ETH_MAINNET_PRIVATE_KEY:-}
      - ETH_CONTRACT_FILE=/shared/EthMerkleAuditAnchor.json
      # ── Sprint 3: Auth & Signup ──
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-https://vargate.ai/api/auth/github/callback}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-Sera (Vargate.ai) <sera@vargate.ai>}
      - JWT_SECRET=${JWT_SECRET:-}
      - VARGATE_BASE_URL=${VARGATE_BASE_URL:-https://vargate.ai}
    volumes:
      - audit-data:/data
      - backup-data:/backup
      - shared-data:/shared:ro
      - ./policies:/app/policies:ro
    depends_on:
      opa:
        condition: service_healthy
      redis:
        condition: service_healthy
      hsm:
        condition: service_healthy
      mock-tools:
        condition: service_healthy
      blockchain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.1
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-vargate-admin}
      - GF_SERVER_ROOT_URL=https://vargate.ai/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy

  docs:
    build:
      context: ./docs-site
    ports:
      - "3002:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  audit-data:
  backup-data:
  bundle-archive:
  hsm-tokens:
  cred-data:
  shared-data:
  prometheus-data:
  grafana-data:
